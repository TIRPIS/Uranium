announce.enemynearby1 = ВНИМАНИЕ \nОбнаружена группа врагов. У вас минута на подготовку.



sector.uranium-missiletestsite.name = Ракетный полигон
sector.uranium-missiletestsite.description = Небольшой лагерь, где ранее тестировались [accent]ракетные турели.[] \nОжидаеться сильное сопротивление.



block.uranium-uranium-reactor.name = Ядерный реактор
block.uranium-uranium-reactor.description = Генерирует большое количество энергии, используя радоактивные вещества, графит и воду. Выделяет заражённую воду и взрывается при её избытке.

block.uranium-enrichmenter.name = Обогатитель
block.uranium-enrichmenter.description = Использует большое количество тория и энергии для формирования урана.

block.uranium-kinetic-enrichmenter.name = Кинетический обогатитель
block.uranium-kinetic-enrichmenter.description = Использует кинетический сплав для ускорения процесса.

block.uranium-uranium-reducer.name = Урановый восстановитель
block.uranium-uranium-reducer.description = Преобразует обеднённый уран в обычный. 

block.uranium-water-irradiator.name = Водяной облучатель
block.uranium-water-irradiator.description = Заражает воду, используя обеднённый уран

block.uranium-payload-railgun.name = Грузовой рельсотрон
block.uranium-payload-railgun.description = Перемещает юнитов и блоки на огромные расстояния.

block.uranium-large-payload-conveyor.name = Большой грузовой конвеер
block.uranium-large-payload-conveyor.description = Перемещает большие грузы.

block.uranium-large-payload-router.name = Большой разгрузочный маршрутизатор
block.uranium-large-payload-router.description = Распределяет грузы между конвеерами.


block.uranium-radiant.name = Блеск
block.uranium-radiant.description = Притягивает летающих юнитов мощным, замедляющим лучом.

block.uranium-piercer.name = Пронзатель
block.uranium-piercer.description = Выпускает одиночный пронзающий луч с мощным уроном.

block.uranium-omega.name = Омега
block.uranium-omega.description = Стреляет залпом из 3 коррозирующих снарядов на большую дистанцию. Требует заражённую воду для работы.
block.uranium-omega.blast-compound.info = Мощные взрывы по большой площади.
block.uranium-omega.silicon.info = Наводящиеся бомбы с большим точечным уроном.
block.uranium-omega.uranium.info = Скоростные снаряды с истощением.

block.uranium-retainer.name = Сдерживатель
block.uranium-retainer.description = Запускает дальнобойные ракеты
block.uranium-retainer.details = Инновационная система.\nИспользует массивные, дистанционно управяемые ракеты для обстрела врагов.\nИз за большого размера, ракеты могут быть сбиты.
block.uranium-retainer.blast-compound.info = Мощный взрыв по области.
block.uranium-retainer.silicon.info = Высокоманёвренен.\nВзрывается градом самонаводящейся шрапнели.
block.uranium-retainer.surge-alloy.info = Кумулятивные ракеты с огромным уроном.\nУвеличенная скорость и дальность.
block.uranium-retainer.uranium.info = Кластерная ракета. Сложнее сбить для точечного огня.

block.uranium-perses.name = Чистильщик
block.uranium-perses.description = Сбивает воздушные цели сверх мощными ракетами



item.uranium-depleted-uranium.name = Обеднённый уран
item.uranium-depleted-uranium.description = Побочный продукт производства урана.

item.uranium-uranium.name = Уран
item.uranium-uranium.description = Сильно радиоактивный материал, созданный из тория.



liquid.uranium-uranium-water.name = Заражённая вода
liquid.uranium-uranium-water.description = Облучённая ураном вода.



unit.uranium-caridea.name = Карида
unit.uranium-caridea.description = Запускает дальнобойные торпеды с самонаведением.

unit.uranium-pisces.name = Пицес
unit.uranium-pisces.description = Запускает пары самонаводящихся ракет. Может пересекать реки.

unit.uranium-teuthida.name = Теутида
unit.uranium-teuthida.description = Стреляет дальнобойными ракетами и истощающими лучами. Может пересекать реки.

unit.uranium-loidron.name = Барражирующий дрон
unit.uranium-loidron.description = Взрывается об врагов.

unit.uranium-selachii.name = Селачи
unit.uranium-selachii.description = Стреляет дальнобойными истощающими лучами. Производит барражирующих дронов.

unit.uranium-balaenidae.name = Баленида
unit.uranium-balaenidae.description = Стреляет сверхдальнобойным истощающим лучом. Защищает себя точечной защитой. Производит барражирующих дронов.



unit.uranium-asteroid.name = Астероид
unit.uranium-asteroid.description = Сбрасывает постоянный поток малых бомб.

unit.uranium-comet.name = Комета
unit.uranium-comet.description = Стреляет постоянным разборочным лучом.
